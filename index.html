<!DOCTYPE html>
<html>
<head>
    <title>Seat Time Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .stats { font-size: 1.5em; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Front Seat Tracker</h1>
    <div class="stats">
        <p>Ronak: <span id="ronakTime">0</span> minutes</p>
        <p>Amisha: <span id="amishaTime">0</span> minutes</p>
    </div>
    <button onclick="startTracking('Ronak')">Ronak in Front</button>
    <button onclick="startTracking('Amisha')">Amisha in Front</button>
    <button onclick="stopTracking()">Stop Timer</button>

    <script>
        let interval;
        let currentChild = localStorage.getItem('currentChild') || null;

        function updateDisplay() {
            document.getElementById('ronakTime').innerText = Math.floor(localStorage.getItem('Ronak') / 60000 || 0);
            document.getElementById('amishaTime').innerText = Math.floor(localStorage.getItem('Amisha') / 60000 || 0);
        }

        function startTracking(child) {
            stopTracking();
            currentChild = child;
            localStorage.setItem('currentChild', child);
            interval = setInterval(() => {
                let time = parseInt(localStorage.getItem(child) || 0);
                localStorage.setItem(child, time + 1000);
                updateDisplay();
            }, 1000);
        }

        function stopTracking() {
            clearInterval(interval);
            localStorage.removeItem('currentChild');
        }

        // Initialize on load
        updateDisplay();
        if (currentChild) startTracking(currentChild);
    </script>
</body>
</html>
