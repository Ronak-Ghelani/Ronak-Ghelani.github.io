<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ronak & Amisha Seat Tracker</title>
    <style>
        body { font-family: sans-serif; background: #e5e7eb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .time { font-family: monospace; font-size: 2rem; margin: 10px 0; color: #111; }
        .stats { font-size: 0.9rem; color: #555; margin-bottom: 20px; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .startR { background: #2563eb; }
        .startA { background: #db2777; }
        .stop { background: #4b5563; }
    </style>
</head>
<body>

<div class="box">
    <h3>Seat Tracker</h3>
    <div class="time" id="timer">00:00:00</div>
    <div class="stats" id="stats">Ronak: 0m | Amisha: 0m</div>
    
    <button class="startR" onclick="start('Ronak')">Start Ronak</button>
    <button class="startA" onclick="start('Amisha')">Start Amisha</button>
    <button class="stop" onclick="stop()">Stop / Sync</button>
</div>

<script>
    // Initialize values if they don't exist
    if(localStorage.getItem('Ronak') === null) localStorage.setItem('Ronak', 0);
    if(localStorage.getItem('Amisha') === null) localStorage.setItem('Amisha', 0);

    let startTime = null;
    let activeChild = null;

    function start(name) {
        stop(); // stop any existing
        activeChild = name;
        startTime = Date.now();
        console.log("Started tracking: " + name);
    }

    function stop() {
        if (activeChild && startTime) {
            let elapsed = Date.now() - startTime;
            let current = parseInt(localStorage.getItem(activeChild));
            localStorage.setItem(activeChild, current + elapsed);
        }
        activeChild = null;
        startTime = null;
        updateUI();
    }

    function updateUI() {
        let r = Math.floor(localStorage.getItem('Ronak') / 60000);
        let a = Math.floor(localStorage.getItem('Amisha') / 60000);
        document.getElementById('stats').innerText = `Ronak: ${r}m | Amisha: ${a}m`;
    }

    // Refresh display every second
    setInterval(() => {
        if (activeChild && startTime) {
            let elapsed = Date.now() - startTime;
            let total = parseInt(localStorage.getItem(activeChild)) + elapsed;
            let s = Math.floor((total / 1000) % 60);
            let m = Math.floor((total / 60000) % 60);
            document.getElementById('timer').innerText = `00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
    }, 1000);

    updateUI();
</script>
</body>
</html>
